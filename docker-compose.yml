version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: pfe-attendance-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: pfe_attendance
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 24f3098d2db359a69778ae198fcff40a5ce65b0d93eed35448483c0d28d838e8
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
